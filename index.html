<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Oluşturma Robotu</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#00b0f0', // Görsellerdeki ana turkuaz/mavi renk
                        brandDark: '#008cbf'
                    },
                    fontFamily: {
                        sans: ['Arial', 'Helvetica', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Genel Stiller */
        body { background-color: #f3f4f6; margin: 0; padding: 0; }
        
        /* A4 Kağıt Tasarımı */
        .a4-wrapper {
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }

        .a4-paper {
            width: 210mm;
            height: 297mm; /* Sabit A4 Yüksekliği */
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            color: #333;
            overflow: hidden;
            flex-shrink: 0;
        }

        .a4-header {
            padding: 15mm 10mm 5mm 10mm;
        }

        /* İki sütunlu alan ve taşma tespiti için özel ayarlar */
        .a4-content {
            padding: 0 10mm;
            column-count: 2;
            column-gap: 12mm;
            column-rule: 2px dashed #00b0f0;
            column-fill: auto;
            overflow-x: hidden; /* Taşmayı gizler ama JS ile tespit edebiliriz */
        }

        .a4-footer {
            padding: 5mm 10mm;
            margin-top: auto; /* En alta iter */
        }

        /* Filigran (Watermark) */
        .watermark-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .watermark-text {
            transform: rotate(-45deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(0, 176, 240, 0.06);
            white-space: nowrap;
            user-select: none;
        }

        /* Soru Stilleri */
        .question-block {
            /* Sütunlar arası bölünmeyi engeller */
            break-inside: avoid;
            page-break-inside: avoid;
            -webkit-column-break-inside: avoid;
            display: inline-block; 
            width: 100%;

            margin-bottom: 8mm;
            position: relative;
            z-index: 10;
        }

        .question-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background-color: #00b0f0;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
            margin-right: 8px;
            float: left;
        }

        .question-text {
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 10px;
            text-align: justify;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
            display: block;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            clear: both;
        }

        .options-flex {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            clear: both;
            margin-top: 10px;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
        }

        .option-letter {
            font-weight: bold;
            margin-right: 5px;
        }

        /* Yazdırma (Print) Stilleri - Düzeltildi */
        @media print {
            html, body, #main-screen {
                height: auto !important;
                overflow: visible !important;
                background: white !important;
            }
            #print-area {
                position: relative !important;
                display: block !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
            }
            .a4-wrapper {
                max-height: none !important;
                overflow: visible !important;
                padding: 0 !important;
                background: white !important;
                display: block !important;
            }
            #pages-container {
                gap: 0 !important;
                padding: 0 !important;
                display: block !important;
            }
            .a4-paper {
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                page-break-after: always;
                page-break-inside: avoid;
                height: 297mm !important; 
            }
            .no-print, nav, #editor-sidebar {
                display: none !important;
            }
        }
        
        /* Özel Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden flex flex-col">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 bg-gray-100 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <i data-lucide="bot" class="w-12 h-12 text-brand mx-auto mb-2"></i>
                <h1 class="text-2xl font-bold text-gray-800">Test Robotu</h1>
                <p class="text-gray-500 text-sm">Öğretmen Giriş Paneli</p>
            </div>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-posta</label>
                    <input type="email" id="auth-email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand focus:border-brand">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Şifre</label>
                    <input type="password" id="auth-password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand focus:border-brand">
                </div>
                <div id="auth-error" class="text-red-500 text-sm hidden">Hata mesajı</div>
                <button type="submit" id="auth-submit-btn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand hover:bg-brandDark focus:outline-none">
                    Giriş Yap
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <button type="button" id="toggle-auth-mode" class="text-sm text-brand hover:underline">
                    Hesabınız yok mu? Kayıt Olun
                </button>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden h-screen flex flex-col bg-gray-100 z-40 relative">
        <nav class="bg-white shadow-sm h-16 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center space-x-2">
                <i data-lucide="layout-dashboard" class="w-6 h-6 text-brand"></i>
                <span class="font-bold text-xl text-gray-800">Ana Panel</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="dashboard-user-email" class="text-sm text-gray-600"></span>
                <button type="button" id="dashboard-logout-btn" class="text-gray-500 hover:text-red-500" title="Çıkış Yap">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </nav>
        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Kayıtlı Testlerim</h2>
                    <button type="button" id="create-new-test-btn" class="bg-brand text-white px-4 py-2 rounded-lg font-bold hover:bg-brandDark flex items-center transition shadow-md">
                        <i data-lucide="plus" class="w-5 h-5 mr-2"></i> Yeni Test Oluştur
                    </button>
                </div>
                <!-- Tests Grid -->
                <div id="tests-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Dinamik test kartları buraya gelecek -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="hidden h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm h-16 flex items-center justify-between px-6 shrink-0 no-print">
            <div class="flex items-center space-x-4">
                <button type="button" id="back-to-dashboard-btn" class="text-gray-500 hover:text-brand flex items-center text-sm font-medium bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 transition" title="Ana Panele Dön">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Geri
                </button>
                <button type="button" id="toggle-sidebar-btn" class="text-brand hover:text-brandDark flex items-center text-sm font-medium bg-blue-50 px-3 py-1.5 rounded-md border border-blue-200 transition" title="Menüyü Aç/Kapat">
                    <i data-lucide="menu" class="w-4 h-4"></i>
                </button>
                <div class="flex items-center space-x-2 border-l pl-4 border-gray-200">
                    <i data-lucide="file-text" class="w-6 h-6 text-brand"></i>
                    <span class="font-bold text-xl text-gray-800">Test Robotu</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button type="button" id="print-preview-btn" class="bg-brand text-white text-sm font-bold px-4 py-1.5 rounded hover:bg-brandDark transition flex items-center">
                    <i data-lucide="printer" class="w-4 h-4 mr-1"></i> Çıktı Al
                </button>
                <span id="user-email-display" class="text-sm text-gray-600 border-l pl-4 border-gray-200"></span>
                <button type="button" id="logout-btn" class="text-gray-500 hover:text-red-500" title="Çıkış Yap">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </nav>

        <!-- Workspace -->
        <div class="flex flex-1 overflow-hidden">
            
            <!-- Left Sidebar (Editor) -->
            <div id="editor-sidebar" class="w-96 bg-white border-r border-gray-200 flex flex-col no-print z-10 shadow-lg transition-all">
                <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">Araç Kutusu</h2>
                    <div class="flex space-x-2">
                        <button type="button" id="save-test-btn" class="p-2 bg-green-100 text-green-700 rounded hover:bg-green-200 transition" title="Veritabanına Kaydet">
                            <i data-lucide="save" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-6">
                    
                    <!-- Test Settings -->
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                            <i data-lucide="settings" class="w-4 h-4 mr-1"></i> Test Başlığı & Ayarlar
                        </h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs text-gray-500">Tarih / Başlık 1 (Örn: 02-03 MART 2026)</label>
                                <input type="text" id="setting-date" value="02-03 MART 2026" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500">Ana Başlık (Örn: GÜNLÜK ÖDEVİ-1)</label>
                                <input type="text" id="setting-title" value="GÜNLÜK ÖDEVİ-1" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                            </div>
                            <div class="flex space-x-2">
                                <div class="flex-1">
                                    <label class="block text-xs text-gray-500">Seviye (Sol Etiket)</label>
                                    <input type="text" id="setting-level" value="Orta Seviye" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                                </div>
                                <div class="w-20">
                                    <label class="block text-xs text-gray-500">Süre (dk)</label>
                                    <input type="text" id="setting-time" value="25" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500">Alt Başlık Açıklaması</label>
                                <input type="text" id="setting-desc" value="Aşağıdaki soruları defterinize belirtilen sürede rahatça çözünüz." class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500">Filigran Yazısı</label>
                                <input type="text" id="setting-watermark" placeholder="Örn: KURUM ADI" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                            </div>
                        </div>
                    </div>

                    <!-- Add Question Form -->
                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <h3 class="text-sm font-bold text-brandDark mb-3 flex items-center">
                            <i data-lucide="plus-circle" class="w-4 h-4 mr-1"></i> Yeni Soru Ekle
                        </h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs text-gray-700 font-medium">Soru Metni</label>
                                <textarea id="q-text" rows="3" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand placeholder-gray-400" placeholder="Sorunuzu buraya yazın..."></textarea>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-700 font-medium mb-1">Soru Görseli (İsteğe Bağlı)</label>
                                <input type="file" id="q-image" accept="image/*" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-brand file:text-white hover:file:bg-brandDark">
                                <div id="image-preview-container" class="hidden mt-2 relative">
                                    <img id="q-image-preview" src="" class="h-20 object-contain rounded border border-gray-200 bg-white">
                                    <button type="button" id="remove-image-btn" class="absolute top-1 left-1 bg-red-500 text-white rounded-full p-0.5 hover:bg-red-600">
                                        <i data-lucide="x" class="w-3 h-3"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-gray-500">A Şıkkı</label>
                                    <input type="text" id="q-optA" class="mt-1 w-full text-sm border-gray-300 rounded p-1 border focus:ring-brand focus:border-brand">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500">B Şıkkı</label>
                                    <input type="text" id="q-optB" class="mt-1 w-full text-sm border-gray-300 rounded p-1 border focus:ring-brand focus:border-brand">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500">C Şıkkı</label>
                                    <input type="text" id="q-optC" class="mt-1 w-full text-sm border-gray-300 rounded p-1 border focus:ring-brand focus:border-brand">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500">D Şıkkı</label>
                                    <input type="text" id="q-optD" class="mt-1 w-full text-sm border-gray-300 rounded p-1 border focus:ring-brand focus:border-brand">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500">Şık Dizilimi</label>
                                <select id="q-layout" class="mt-1 w-full text-sm border-gray-300 rounded p-1.5 border focus:ring-brand focus:border-brand">
                                    <option value="flex">Yan Yana (A B C D)</option>
                                    <option value="grid">2x2 Izgara (A B altlı üstlü C D)</option>
                                    <option value="none">Şık Yok (Sadece Metin/Görsel)</option>
                                </select>
                            </div>
                            <button type="button" id="add-question-btn" class="w-full bg-brand text-white text-sm font-bold py-2 rounded hover:bg-brandDark transition mt-2 flex items-center justify-center">
                                <i data-lucide="check" class="w-4 h-4 mr-1"></i> Listeye Ekle
                            </button>
                        </div>
                    </div>

                    <!-- Question List -->
                    <div>
                        <h3 class="text-sm font-bold text-gray-700 mb-2 border-b pb-1">Eklenen Sorular (<span id="q-count">0</span>)</h3>
                        <div id="questions-list" class="space-y-2">
                            <p class="text-xs text-gray-400 italic">Henüz soru eklenmedi.</p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right Preview Area -->
            <div id="print-area" class="flex-1 bg-gray-200 relative">
                <div class="a4-wrapper">
                    <!-- Javascript ile çoklu sayfalar (A4 kağıtları) buraya yerleşecek -->
                    <div id="pages-container" class="flex flex-col gap-8 pb-8">
                        <!-- Sayfalar buraya append edilecek -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Bildirim Modalı -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        Mesaj
    </div>

    <!-- Scripts -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        lucide.createIcons();

        // 1. Supabase Kurulumu
        const SUPABASE_URL = 'https://jyqnxmichrguerebexfi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_krJCbyOP3AXhaCOt1MUPBA_xkcI-XFO'; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Uygulama State'i
        let questions = [];
        let isLoginMode = true;
        let pendingImageData = null;
        let currentUser = null;
        let currentTestId = null; 

        // UI Elementleri
        const authScreen = document.getElementById('auth-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const mainScreen = document.getElementById('main-screen');
        const editorSidebar = document.getElementById('editor-sidebar');
        
        const authForm = document.getElementById('auth-form');
        const toggleAuthModeBtn = document.getElementById('toggle-auth-mode');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const authError = document.getElementById('auth-error');
        
        const createNewTestBtn = document.getElementById('create-new-test-btn');
        const backToDashboardBtn = document.getElementById('back-to-dashboard-btn');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');
        const printPreviewBtn = document.getElementById('print-preview-btn');
        const testsGrid = document.getElementById('tests-grid');

        // Ayar Elementleri
        const inputs = {
            date: document.getElementById('setting-date'),
            title: document.getElementById('setting-title'),
            level: document.getElementById('setting-level'),
            time: document.getElementById('setting-time'),
            desc: document.getElementById('setting-desc'),
            watermark: document.getElementById('setting-watermark')
        };

        // 2. Auth Mantığı
        const initAuth = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            handleAuthChange(session?.user || null);

            supabase.auth.onAuthStateChange((_event, session) => {
                handleAuthChange(session?.user || null);
            });
        };

        function handleAuthChange(user) {
            currentUser = user;
            if (user) {
                document.getElementById('user-email-display').textContent = user.email;
                document.getElementById('dashboard-user-email').textContent = user.email;
                showDashboard();
            } else {
                showAuthScreen();
            }
        }

        initAuth();

        function showDashboard() {
            authScreen.classList.add('hidden');
            mainScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            loadTests();
        }

        function showMainScreen(isNew = false) {
            if (isNew) {
                currentTestId = null;
                questions = [];
                inputs.title.value = "GÜNLÜK ÖDEVİ-1";
                inputs.date.value = "02-03 MART 2026";
                inputs.level.value = "Orta Seviye";
                inputs.time.value = "25";
                inputs.desc.value = "Aşağıdaki soruları defterinize belirtilen sürede rahatça çözünüz.";
                inputs.watermark.value = "";
                clearForm();
                renderQuestions();
                updateQuestionsList();
            }
            editorSidebar.classList.remove('hidden'); // Yeni açıldığında sidebar hep açık
            authScreen.classList.add('hidden');
            dashboardScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            lucide.createIcons();
        }

        function showAuthScreen() {
            authScreen.classList.remove('hidden');
            dashboardScreen.classList.add('hidden');
            mainScreen.classList.add('hidden');
        }

        // Tıklamalar
        createNewTestBtn.addEventListener('click', () => showMainScreen(true));
        backToDashboardBtn.addEventListener('click', () => showDashboard());
        toggleSidebarBtn.addEventListener('click', () => editorSidebar.classList.toggle('hidden'));
        printPreviewBtn.addEventListener('click', () => window.print());

        toggleAuthModeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authSubmitBtn.textContent = isLoginMode ? 'Giriş Yap' : 'Kayıt Ol';
            toggleAuthModeBtn.textContent = isLoginMode ? 'Hesabınız yok mu? Kayıt Olun' : 'Zaten hesabınız var mı? Giriş Yapın';
            authError.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            authError.classList.add('hidden');

            try {
                if (isLoginMode) {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                } else {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    showToast("Kayıt işlemi başarılı! Sisteme giriş yapılıyor...");
                }
            } catch (error) {
                authError.textContent = error.message;
                authError.classList.remove('hidden');
            }
        });

        const handleLogout = async () => { await supabase.auth.signOut(); };
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        document.getElementById('dashboard-logout-btn').addEventListener('click', handleLogout);

        // Dashboard Veri Yükleme
        async function loadTests() {
            testsGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">Testler yükleniyor...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('tests')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    testsGrid.innerHTML = `
                        <div class="col-span-full text-center bg-white p-8 rounded-xl shadow-sm border border-gray-200">
                            <i data-lucide="folder-open" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                            <h3 class="text-lg font-medium text-gray-800 mb-1">Henüz testiniz yok</h3>
                            <p class="text-gray-500 text-sm">Sağ üstteki butonu kullanarak ilk testinizi oluşturabilirsiniz.</p>
                        </div>
                    `;
                } else {
                    // BAŞLIĞA TIKLAYINCA PDF GÖRÜNTÜLEME EKLENDİ
                    testsGrid.innerHTML = data.map(test => `
                        <div class="bg-white rounded-xl p-5 border border-gray-200 shadow-sm hover:shadow-md transition group relative flex flex-col h-full">
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 onclick="previewTestAsPDF('${test.id}')" title="Tıkla ve PDF Olarak Görüntüle" class="font-bold text-lg text-brandDark line-clamp-2 cursor-pointer hover:underline hover:text-brand transition">${test.title}</h3>
                                    <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded font-medium">${test.date}</span>
                                </div>
                                <p class="text-sm text-gray-500 mb-4 line-clamp-2">${test.desc_text}</p>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <span class="inline-flex items-center text-xs text-gray-600 bg-gray-50 border border-gray-200 px-2 py-1 rounded">
                                        <i data-lucide="bar-chart-2" class="w-3 h-3 mr-1"></i> ${test.level}
                                    </span>
                                    <span class="inline-flex items-center text-xs text-gray-600 bg-gray-50 border border-gray-200 px-2 py-1 rounded">
                                        <i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${test.time} dk
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-2 pt-4 border-t border-gray-100 mt-auto">
                                <button type="button" onclick="openTest('${test.id}')" class="flex-1 bg-brand text-white py-2 rounded text-sm font-medium hover:bg-brandDark transition flex items-center justify-center">
                                    <i data-lucide="edit-3" class="w-4 h-4 mr-1"></i> Düzenle
                                </button>
                                <button type="button" onclick="deleteTestRecord('${test.id}')" class="p-2 bg-red-50 text-red-600 rounded hover:bg-red-100 transition" title="Sil">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
                lucide.createIcons();
            } catch (error) {
                testsGrid.innerHTML = '<div class="col-span-full text-center text-red-500">Testler yüklenirken bir hata oluştu.</div>';
            }
        }

        window.openTest = async (id, isPreview = false) => {
            try {
                const { data, error } = await supabase.from('tests').select('*').eq('id', id).single();
                if (error) throw error;

                currentTestId = data.id;
                inputs.title.value = data.title;
                inputs.date.value = data.date;
                inputs.level.value = data.level;
                inputs.time.value = data.time;
                inputs.desc.value = data.desc_text;
                questions = data.questions || [];

                renderQuestions();
                updateQuestionsList();
                showMainScreen();

                if (isPreview) {
                    editorSidebar.classList.add('hidden');
                    setTimeout(() => window.print(), 500); // Açıldıktan yarım saniye sonra yazdırma ekranı (PDF Önizleme)
                }
            } catch (error) {
                showToast("Test yüklenemedi!");
            }
        };

        // Başlığa Tıklandığında PDF modunda aç
        window.previewTestAsPDF = (id) => {
            window.openTest(id, true);
        }

        window.deleteTestRecord = async (id) => {
            if (!confirm("Bu testi silmek istediğinize emin misiniz?")) return;
            try {
                const { error } = await supabase.from('tests').delete().eq('id', id);
                if (error) throw error;
                showToast("Test silindi!");
                loadTests();
            } catch (error) {
                showToast("Silinirken hata oluştu!");
            }
        };

        // 3. Resim Yükleme (Base64)
        const qImageInput = document.getElementById('q-image');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const qImagePreview = document.getElementById('q-image-preview');

        qImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    pendingImageData = canvas.toDataURL('image/jpeg', 0.7);
                    qImagePreview.src = pendingImageData;
                    imagePreviewContainer.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('remove-image-btn').addEventListener('click', () => {
            pendingImageData = null;
            qImageInput.value = '';
            imagePreviewContainer.classList.add('hidden');
        });

        // 4. OTOMATİK SAYFALAMA VE A4 RENDER MANTIĞI
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', updateA4Settings);
        });

        function updateA4Settings() {
            const dateVal = inputs.date.value || 'Tarih';
            const titleVal = inputs.title.value || 'BAŞLIK';
            const levelVal = inputs.level.value || 'Seviye';
            const timeVal = inputs.time.value || '0';
            const descVal = inputs.desc.value || '';
            const watermarkVal = inputs.watermark.value || '';
            const footerTitleVal = `${inputs.date.value} Ödevi`;

            document.querySelectorAll('.render-date').forEach(el => el.textContent = dateVal);
            document.querySelectorAll('.render-title').forEach(el => el.textContent = titleVal);
            document.querySelectorAll('.render-level').forEach(el => el.textContent = levelVal);
            document.querySelectorAll('.render-time').forEach(el => el.textContent = timeVal);
            document.querySelectorAll('.render-desc').forEach(el => el.textContent = descVal);
            document.querySelectorAll('.render-watermark').forEach(el => el.textContent = watermarkVal);
            document.querySelectorAll('.render-footer-title').forEach(el => el.textContent = footerTitleVal);
        }

        document.getElementById('add-question-btn').addEventListener('click', () => {
            const text = document.getElementById('q-text').value.trim();
            const optA = document.getElementById('q-optA').value.trim();
            const optB = document.getElementById('q-optB').value.trim();
            const optC = document.getElementById('q-optC').value.trim();
            const optD = document.getElementById('q-optD').value.trim();
            const layout = document.getElementById('q-layout').value;

            if (!text && !pendingImageData) {
                showToast("Lütfen soru metni veya görsel ekleyin!");
                return;
            }

            questions.push({
                id: Date.now().toString(),
                text,
                image: pendingImageData,
                options: { A: optA, B: optB, C: optC, D: optD },
                layout
            });

            renderQuestions();
            updateQuestionsList();
            clearForm();
            showToast("Soru eklendi!");
        });

        function clearForm() {
            document.getElementById('q-text').value = '';
            document.getElementById('q-optA').value = '';
            document.getElementById('q-optB').value = '';
            document.getElementById('q-optC').value = '';
            document.getElementById('q-optD').value = '';
            document.getElementById('remove-image-btn').click(); 
        }

        function createPageDom(pageNum) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'a4-paper';
            
            // Filigran
            pageDiv.innerHTML = `<div class="watermark-container"><div class="watermark-text render-watermark"></div></div>`;

            // Özel Başlık (Sayfa 1 vs Diğerleri)
            let headerHTML = '';
            if (pageNum === 1) {
                headerHTML = `
                    <div class="a4-header z-10 relative">
                        <div class="flex items-center justify-between mb-2 relative">
                            <div class="w-24 h-24 bg-teal-50 rounded-lg flex flex-col items-center justify-center text-teal-600 border border-teal-100">
                               <i data-lucide="calendar-days" class="w-10 h-10 mb-1"></i>
                               <i data-lucide="check-square" class="w-6 h-6"></i>
                            </div>
                            <div class="text-center flex-1 px-4">
                                <h1 class="text-4xl font-black text-brand tracking-wider mb-1 render-date"></h1>
                                <h2 class="text-3xl font-black text-gray-800 tracking-wide render-title"></h2>
                            </div>
                            <div class="w-24 h-24 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 border border-blue-100">
                                <i data-lucide="book-open" class="w-12 h-12"></i>
                            </div>
                        </div>
                        <div class="relative flex items-center bg-brand rounded-full h-10 mt-4 shadow-sm">
                            <div class="bg-gray-200 text-gray-800 font-bold px-4 py-1.5 rounded-full ml-1 text-sm z-10 render-level"></div>
                            <div class="text-white font-medium text-sm ml-4 flex-1 render-desc"></div>
                            <div class="absolute -right-2 -top-4 w-16 h-16 bg-brand rounded-full flex flex-col items-center justify-center text-white shadow-md border-4 border-white">
                                <span class="font-black text-xl leading-none mt-1 render-time"></span>
                                <span class="text-xs font-bold">dk</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // Diğer sayfalar için sade başlık
                headerHTML = `
                    <div class="a4-header z-10 relative pb-2" style="padding-top: 10mm;">
                        <div class="relative flex items-center bg-brand rounded-full h-10 shadow-sm">
                            <div class="bg-gray-200 text-gray-800 font-bold px-4 py-1.5 rounded-full ml-1 text-sm z-10 render-level"></div>
                            <div class="text-white font-medium text-sm ml-4 flex-1 render-desc"></div>
                        </div>
                    </div>
                `;
            }
            pageDiv.insertAdjacentHTML('beforeend', headerHTML);

            // Soru Sütunları Alanı
            const contentDiv = document.createElement('div');
            contentDiv.className = 'a4-content z-10 relative';
            // Sayfa 1'de başlık büyük olduğu için yükseklik daha az
            contentDiv.style.height = pageNum === 1 ? '205mm' : '240mm'; 
            pageDiv.appendChild(contentDiv);

            // Footer
            pageDiv.insertAdjacentHTML('beforeend', `
                <div class="a4-footer z-10 relative flex items-center justify-between bg-brand text-white rounded-t-xl px-6 py-2">
                    <div class="font-bold text-lg">Sayfa-${pageNum}</div>
                    <div class="font-bold text-lg render-footer-title"></div>
                </div>
            `);

            document.getElementById('pages-container').appendChild(pageDiv);
            return contentDiv;
        }

        function renderQuestions() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            
            if (questions.length === 0) {
                createPageDom(1);
                updateA4Settings();
                lucide.createIcons();
                return;
            }

            let pageNum = 1;
            let currentContentDiv = createPageDom(pageNum);

            questions.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-block';

                let html = `<div class="question-number">${index + 1}</div>`;
                if (q.text) {
                    html += `<div class="question-text">${q.text.replace(/\n/g, '<br>')}</div>`;
                }
                if (q.image) {
                    html += `<img src="${q.image}" class="question-image" alt="">`;
                }

                if (q.layout !== 'none' && (q.options.A || q.options.B || q.options.C || q.options.D)) {
                    const optsClass = q.layout === 'grid' ? 'options-grid' : 'options-flex';
                    html += `<div class="${optsClass}">`;
                    if(q.options.A) html += `<div class="option-item"><span class="option-letter">A)</span> ${q.options.A}</div>`;
                    if(q.options.B) html += `<div class="option-item"><span class="option-letter">B)</span> ${q.options.B}</div>`;
                    if(q.options.C) html += `<div class="option-item"><span class="option-letter">C)</span> ${q.options.C}</div>`;
                    if(q.options.D) html += `<div class="option-item"><span class="option-letter">D)</span> ${q.options.D}</div>`;
                    html += `</div>`;
                }

                qDiv.innerHTML = html;
                currentContentDiv.appendChild(qDiv);

                // Eğer eklenen soru sayfanın sağına taştıysa (Sayfa Dolduysa)
                if (currentContentDiv.scrollWidth > currentContentDiv.clientWidth + 5) {
                    currentContentDiv.removeChild(qDiv); // O sayfadan çıkar
                    pageNum++;
                    currentContentDiv = createPageDom(pageNum); // Yeni A4 Sayfası Yarat
                    currentContentDiv.appendChild(qDiv); // Yeni sayfaya ekle
                }
            });

            updateA4Settings();
            lucide.createIcons();
        }

        function updateQuestionsList() {
            const list = document.getElementById('questions-list');
            document.getElementById('q-count').textContent = questions.length;
            if (questions.length === 0) {
                list.innerHTML = '<p class="text-xs text-gray-400 italic">Henüz soru eklenmedi.</p>';
                return;
            }

            list.innerHTML = '';
            questions.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center bg-white p-2 border border-gray-200 rounded text-sm';
                const previewText = q.text ? (q.text.substring(0, 20) + '...') : '[Görsel]';
                item.innerHTML = `
                    <span class="font-medium text-gray-700">Soru ${index + 1}: <span class="text-gray-500 font-normal">${previewText}</span></span>
                    <button type="button" class="text-red-500 hover:text-red-700 p-1" onclick="deleteQuestion('${q.id}')">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        window.deleteQuestion = (id) => {
            questions = questions.filter(q => q.id !== id);
            renderQuestions();
            updateQuestionsList();
        };

        // 5. Kaydetme
        document.getElementById('save-test-btn').addEventListener('click', async () => {
            if (!currentUser) { showToast("Giriş yapmalısınız!"); return; }
            if (questions.length === 0) { showToast("Test boş!"); return; }

            try {
                const testData = {
                    user_id: currentUser.id,
                    title: inputs.title.value,
                    date: inputs.date.value,
                    level: inputs.level.value,
                    time: inputs.time.value,
                    desc_text: inputs.desc.value,
                    questions: questions 
                };

                if (currentTestId) {
                    await supabase.from('tests').update(testData).eq('id', currentTestId);
                    showToast("Güncellendi!");
                } else {
                    const { data, error } = await supabase.from('tests').insert([testData]).select();
                    if (error) throw error;
                    if (data && data.length > 0) currentTestId = data[0].id;
                    showToast("Yeni test kaydedildi!");
                }
            } catch (error) {
                showToast("Kaydedilemedi!");
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

    </script>
</body>
</html>
